<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Guia de Restaurantes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Banner -->
  <img src="assets/banner-restaurante.png" alt="Banner" class="banner" />

  <!-- Boas-vindas -->
  <div class="welcome">
    <h1>Bem-vindo ao Guia de Restaurantes!</h1>
    <p>Encontre os melhores restaurantes da sua cidade.</p>
  </div>

  <!-- Cards -->
  <ion-grid>
    <ion-row>

      <ion-col size="6">
        <ion-card>
          <ion-card-content>
            <ion-icon name="restaurant" color="danger"></ion-icon>
            <h2>Restaurantes</h2>
            <p>Ver todos</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card>
          <ion-card-content>
            <ion-icon name="star" color="warning"></ion-icon>
            <h2>Favoritos</h2>
            <p>Meus favoritos</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card>
          <ion-card-content>
            <ion-icon name="restaurant" color="danger"></ion-icon>
            <h2>Restaurantes</h2>
            <p>Ver todos</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card>
          <ion-card-content>
            <ion-icon name="star" color="warning"></ion-icon>
            <h2>Favoritos</h2>
            <p>Meus favoritos</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>

<!-- Tabs -->
<ion-footer>
  <ion-toolbar class="footer-toolbar">
    <div class="footer-menu">

      <div class="item ativo">
        <ion-icon name="home"></ion-icon>
        <span>Início</span>
      </div>

      <div class="item">
        <ion-icon name="heart-outline"></ion-icon>
        <span>Favoritos</span>
      </div>

      <div class="item">
        <ion-icon name="person-outline"></ion-icon>
        <span>Perfil</span>
      </div>

    </div>
  </ion-toolbar>
</ion-footer>
